<!DOCTYPE html>
<html>

<head>
    <title>Test Admin Login</title>
</head>

<body>
    <h1>Test Admin Login API</h1>

    <div>
        <h2>Login</h2>
        <input type="email" id="email" value="admin@mann.com" placeholder="Email">
        <input type="password" id="password" value="admin123" placeholder="Password">
        <button onclick="testLogin()">Login</button>
    </div>

    <div>
        <h2>Test Orders (after login)</h2>
        <button onclick="testOrders()">Fetch Orders</button>
    </div>

    <div>
        <h2>Results</h2>
        <pre id="results"></pre>
    </div>

    <script>
        const API_URL = 'http://localhost:5001';

        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                console.log('Attempting login...');
                const response = await fetch(`${API_URL}/api/admin/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                console.log('Login response:', data);

                if (data.success && data.token) {
                    localStorage.setItem('adminToken', data.token);
                    document.getElementById('results').textContent =
                        'Login successful!\n' + JSON.stringify(data, null, 2);
                } else {
                    document.getElementById('results').textContent =
                        'Login failed!\n' + JSON.stringify(data, null, 2);
                }
            } catch (error) {
                console.error('Login error:', error);
                document.getElementById('results').textContent =
                    'Error: ' + error.message;
            }
        }

        async function testOrders() {
            const token = localStorage.getItem('adminToken');

            if (!token) {
                document.getElementById('results').textContent =
                    'No token found! Please login first.';
                return;
            }

            try {
                console.log('Fetching orders with token:', token.substring(0, 30) + '...');
                const response = await fetch(`${API_URL}/api/admin/orders`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                    }
                });

                const data = await response.json();
                console.log('Orders response:', data);

                document.getElementById('results').textContent =
                    `Status: ${response.status}\n` +
                    JSON.stringify(data, null, 2);
            } catch (error) {
                console.error('Orders error:', error);
                document.getElementById('results').textContent =
                    'Error: ' + error.message;
            }
        }
    </script>
</body>

</html>
