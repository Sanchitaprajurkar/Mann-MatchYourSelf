<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/Logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- ✅ CRITICAL PERFORMANCE OPTIMIZATIONS -->
    
    <!-- ✅ PRECONNECT TO API DOMAIN -->
    <link rel="preconnect" href="http://localhost:5000" />
    <link rel="dns-prefetch" href="http://localhost:5000" />
    
    <!-- ✅ PRECONNECT TO EXTERNAL DOMAINS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="preconnect" href="https://api.cloudinary.com" />
    
    <!-- ✅ DNS PREFETCH FOR NON-CRITICAL -->
    <link rel="dns-prefetch" href="//images.unsplash.com" />
    <link rel="dns-prefetch" href="//wa.me" />
    <link rel="dns-prefetch" href="//www.google-analytics.com" />
    
    <!-- ✅ PRELOAD CRITICAL HERO IMAGE -->
    <link rel="preload" as="image" href="/images/hero/hero1.webp" type="image/webp" />
    <link rel="preload" as="image" href="/images/hero/hero1.jpg" />
    
    <!-- ✅ PRELOAD CRITICAL FONTS -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" as="style" />
    <link rel="preload" as="font" href="https://fonts.gstatic.com/s/inter/v12/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuLyfAZ9hiA.woff2" type="font/woff2" crossorigin />
    
    <!-- ✅ CRITICAL CSS (INSTANT PAINT) -->
    <style>
      /* ✅ ABOVE-THE-FOLD STYLES */
      * { box-sizing: border-box; }
      body { 
        margin: 0; 
        padding: 0; 
        background: #FAF9F6; 
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        line-height: 1.6;
        color: #1A1A1A;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* ✅ HERO SECTION CRITICAL STYLES */
      .hero { 
        position: relative;
        height: 100vh; 
        width: 100%; 
        overflow: hidden;
        background: linear-gradient(135deg, #1A1A1A 0%, #2D2D2D 100%);
      }
      
      .hero-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 10;
        color: white;
      }
      
      .hero-title {
        font-size: clamp(2rem, 8vw, 4rem);
        font-weight: 700;
        margin-bottom: 1rem;
        animation: fadeInUp 1s ease-out;
      }
      
      .hero-subtitle {
        font-size: clamp(1rem, 3vw, 1.5rem);
        font-weight: 300;
        margin-bottom: 2rem;
        opacity: 0.9;
        animation: fadeInUp 1s ease-out 0.2s both;
      }
      
      /* ✅ NAVBAR CRITICAL STYLES */
      .navbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        background: rgba(26, 26, 26, 0.95);
        backdrop-filter: blur(10px);
        padding: 1rem 2rem;
        transition: all 0.3s ease;
      }
      
      .navbar-scrolled {
        padding: 0.5rem 2rem;
        background: rgba(26, 26, 26, 0.98);
      }
      
      /* ✅ LOADING STATES */
      .skeleton {
        background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
        background-size: 200% 100%;
        animation: loading 1.5s infinite;
      }
      
      /* ✅ MOBILE OPTIMIZATIONS */
      img {
        max-width: 100%;
        height: auto;
        display: block;
      }
      
      /* ✅ SMOOTH SCROLLING */
      html {
        scroll-behavior: smooth;
      }
      
      /* ✅ ANIMATIONS */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      @keyframes loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      
      /* ✅ BUTTON STYLES */
      .btn-primary {
        background: #C5A059;
        color: #1A1A1A;
        border: none;
        padding: 1rem 2rem;
        border-radius: 50px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-block;
      }
      
      .btn-primary:hover {
        background: #B8941F;
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(197, 160, 89, 0.3);
      }
      
      /* ✅ RESPONSIVE TYPOGRAPHY */
      @media (max-width: 768px) {
        .hero-title { font-size: clamp(1.5rem, 6vw, 2.5rem); }
        .hero-subtitle { font-size: clamp(0.9rem, 2.5vw, 1.2rem); }
        .navbar { padding: 0.75rem 1rem; }
        .navbar-scrolled { padding: 0.5rem 1rem; }
      }
      
      /* ✅ PERFORMANCE CRITICAL */
      .will-change-transform { will-change: transform; }
      .gpu-accelerated { transform: translateZ(0); }
      
      /* ✅ LAZY LOADING PLACEHOLDER */
      .lazy-image {
        background: #f0f0f0;
        transition: opacity 0.3s ease;
      }
      
      .lazy-image.loaded {
        opacity: 1;
      }
    </style>
    
    <!-- ✅ PERFORMANCE HINTS -->
    <meta name="theme-color" content="#1A1A1A" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <!-- ✅ SEO META TAGS -->
    <title>Mann Match Your Self - Exquisite Ethnic Wear & Contemporary Fashion</title>
    <meta name="description" content="Discover exquisite ethnic wear and contemporary fashion at Mann Match Yourself. Shop our curated collection of sarees, lehengas, and designer apparel." />
    <meta name="keywords" content="Mann Match Yourself, ethnic wear, sarees, lehengas, designer clothing, fashion, indian wear, contemporary fashion" />
    <meta name="author" content="Mann Match Your Self" />
    
    <!-- ✅ OPEN GRAPH -->
    <meta property="og:title" content="Mann Match Your Self - Exquisite Ethnic Wear & Contemporary Fashion" />

    <meta property="og:image" content="/images/hero/hero1.webp" />

    <!-- ✅ TWITTER CARD -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mann Match Your Self - Exquisite Ethnic Wear & Contemporary Fashion" />
    <meta name="twitter:description" content="Discover exquisite ethnic wear and contemporary fashion at Mann Match Yourself." />
    <meta name="twitter:image" content="/images/hero/hero1.webp" />
    
    <!-- ✅ CANONICAL URL -->
    <link rel="canonical" href="https://mannmatchyourself.com" />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- ✅ PERFORMANCE MONITORING -->
    <script>
      // ✅ WEB VITALS MONITORING
      if ('PerformanceObserver' in window) {
        const observer = new PerformanceObserver((list) => {
          for (const entry of list.getEntries()) {
            if (entry.entryType === 'largest-contentful-paint') {
              console.log('🎯 LCP:', entry.startTime);
              // Send to analytics if needed
              if (gtag) {
                gtag('event', 'LCP', { value: entry.startTime });
              }
            }
            if (entry.entryType === 'first-input') {
              console.log('⚡ FID:', entry.processingStart - entry.startTime);
              if (gtag) {
                gtag('event', 'FID', { value: entry.processingStart - entry.startTime });
              }
            }
            if (entry.entryType === 'layout-shift') {
              if (!entry.hadRecentInput) {
                console.log('📐 CLS:', entry.value);
                if (gtag) {
                  gtag('event', 'CLS', { value: entry.value });
                }
              }
            }
          }
        });
        observer.observe({entryTypes: ['largest-contentful-paint', 'first-input', 'layout-shift']});
      }
      
      // ✅ NETWORK PERFORMANCE MONITORING
      if ('connection' in navigator) {
        const connection = navigator.connection;
        console.log('🌐 Network:', connection.effectiveType, connection.downlink);
        
        // Optimize based on connection
        if (connection.effectiveType === 'slow-2g' || connection.effectiveType === '2g') {
          console.log('🐌 Slow connection detected - applying optimizations');
          document.documentElement.classList.add('slow-connection');
        }
      }
      
      // ✅ DEVICE MEMORY OPTIMIZATION
      if ('deviceMemory' in navigator) {
        console.log('💾 Device Memory:', navigator.deviceMemory, 'GB');
        if (navigator.deviceMemory < 4) {
          document.documentElement.classList.add('low-memory');
        }
      }
    </script>
  </body>
</html>
